# Sift — Fly.io deployment config.
#
# Single container running FastAPI on :8000, serving both /api/* and the
# Vite-built SPA. Postgres lives on Neon (managed) per ADR-0002 — DATABASE_URL
# in Fly secrets. Uploads go to a Fly volume mounted at /data/uploads.
#
# After `fly launch`, set these secrets:
#   fly secrets set ANTHROPIC_API_KEY=...
#   fly secrets set DATABASE_URL=postgresql+psycopg://...neon...
#
# App name is set by `fly launch`; replace this line if you rename it.
app = "sift"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SIFT_LOG_FORMAT = "json"
  SIFT_LOG_LEVEL = "INFO"
  SIFT_UPLOAD_DIR = "/data/uploads"

[[mounts]]
  source = "sift_uploads"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
