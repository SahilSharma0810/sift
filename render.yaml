# Sift — Render Blueprint.
#
# Free-tier deploy of the root Dockerfile. Postgres lives on Neon (managed)
# per ADR-0002. Invoice PDFs live in Cloudflare R2 (S3-compatible, zero
# egress) per ADR-0007. Both DATABASE_URL and the four SIFT_R2_* vars are
# set as secrets in the Render dashboard.
#
# First-time setup:
#   1. https://dashboard.render.com → New → Blueprint → connect this repo.
#   2. Render reads this file and provisions the service.
#   3. Set the secret envs in the dashboard:
#        DATABASE_URL=postgresql+psycopg://...neon...
#        SIFT_SECRET_KEY=<openssl rand -hex 32>
#        SIFT_R2_ACCOUNT_ID=...  (from R2 dashboard)
#        SIFT_R2_ACCESS_KEY_ID=...
#        SIFT_R2_SECRET_ACCESS_KEY=...
#        SIFT_R2_BUCKET=...
#   4. Click Apply. First deploy runs `alembic upgrade head` then uvicorn.

services:
  - type: web
    name: sift
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SIFT_LLM_PROVIDER
        value: stub
      - key: SIFT_COOKIE_SECURE
        value: "true"
      - key: SIFT_BLOB_STORE
        value: r2
      - key: SIFT_LOG_FORMAT
        value: json
      - key: SIFT_LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: SIFT_SECRET_KEY
        sync: false
      - key: SIFT_R2_ACCOUNT_ID
        sync: false
      - key: SIFT_R2_ACCESS_KEY_ID
        sync: false
      - key: SIFT_R2_SECRET_ACCESS_KEY
        sync: false
      - key: SIFT_R2_BUCKET
        sync: false
