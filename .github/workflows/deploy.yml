name: Deploy

# Deploys to Fly.io on push to main, after CI has passed.
#
# Prerequisites (one-time):
#   1. Create the app:  flyctl apps create sift   (or whatever name in fly.toml)
#   2. Set secrets:
#        flyctl secrets set DATABASE_URL=postgresql+psycopg://...neon...
#        flyctl secrets set ANTHROPIC_API_KEY=sk-ant-...   # only if anthropic mode
#        flyctl secrets set SIFT_LLM_PROVIDER=stub          # or anthropic
#   3. Add a FLY_API_TOKEN repo secret:  flyctl auth token | gh secret set FLY_API_TOKEN

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    # Don't deploy from forks
    if: github.repository_owner == github.event.repository.owner.login
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
